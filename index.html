<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Closet">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/app-icon-192.png">
    <title>Closet Explore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #fff; color: #1a1a1a; overflow-x: hidden; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .tag { background: #f3f4f6; transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; border: 1px solid transparent; display: flex; align-items: center; justify-content: center; }
        .tag:active { transform: scale(0.96); }
        .tag-s { height: 38px; padding: 0 18px; border-radius: 1rem; white-space: nowrap; }
        .tag-l { min-height: 72px; border-radius: 1.5rem; flex-direction: column; padding: 12px; }
        .tag.selected { background: rgba(229,231,235,0.6); backdrop-filter: blur(12px); transform: scale(1.05); border-color: rgba(0,0,0,0.05); box-shadow: 0 8px 20px -6px rgba(0,0,0,0.08); }
        .tag-t { font-weight: 700; font-size: 12px; color: #6b7280; }
        .tag.selected .tag-t { color: #111827; }
        .tag-c { font-size: 10px; font-weight: 800; margin-top: 4px; color: #9ca3af; }
        .tab { position: relative; padding-bottom: 12px; font-size: 15px; font-weight: 800; transition: all 0.3s; }
        .tab.active { color: #000; } .tab:not(.active) { color: #d1d5db; }
        .tab-dot { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #000; border-radius: 50%; opacity: 0; transition: opacity 0.3s; }
        .tab.active .tab-dot { opacity: 1; }
        .card { background: #f9fafb; border-radius: 2rem; aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; border: 1px solid #f3f4f6; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal.show { opacity: 1; pointer-events: auto; }
        .modal-box { background: #fff; width: 100%; border-radius: 2.5rem 2.5rem 0 0; padding: 2rem; max-height: 92vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal.show .modal-box { transform: translateY(0); }
        input, select, textarea { -webkit-appearance: none; appearance: none; border: none; outline: none; background: #f3f4f6; }
        .hidden { display: none !important; }
        .del-btn { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
        .edit-btn { position: absolute; top: 8px; left: 8px; width: 28px; height: 28px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #9ca3af; }
        .empty-state svg { width: 64px; height: 64px; margin: 0 auto 16px; opacity: 0.3; }
    </style>
</head>
<body class="bg-white min-h-screen">
    <!-- 首页 -->
    <div id="page-home">
        <div class="safe-top bg-white sticky top-0 z-50"></div>
        <header class="px-6 bg-white sticky top-[env(safe-area-inset-top)] z-50">
            <div class="flex items-center justify-between h-16">
                <h1 class="text-2xl font-extrabold tracking-tighter">Closet</h1>
                <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center" onclick="exportData()">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                </div>
            </div>
            <div class="relative mb-6">
                <input type="text" id="searchInput" placeholder="搜索关键词、风格、场合..." oninput="doSearch()" class="w-full bg-gray-100 rounded-2xl py-3.5 px-12 text-sm font-semibold">
                <svg class="absolute left-4 top-4 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <button onclick="clearSearch()" id="clearBtn" class="hidden absolute right-4 top-3.5 w-6 h-6 bg-gray-300 rounded-full text-white text-xs">×</button>
            </div>
            <div class="flex space-x-8 mb-2">
                <button onclick="setTab('ootd')" id="tab-ootd" class="tab active">全部单品<div class="tab-dot"></div></button>
                <button onclick="setTab('closet')" id="tab-closet" class="tab">分类浏览<div class="tab-dot"></div></button>
            </div>
        </header>

        <main class="px-6 pt-4 pb-32">
            <!-- 搜索结果 -->
            <div id="searchResults" class="hidden">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-xs font-black uppercase tracking-widest text-gray-400">搜索结果</h3>
                    <span id="searchCount" class="text-xs text-gray-400"></span>
                </div>
                <div id="searchGrid" class="grid grid-cols-2 gap-4"></div>
            </div>

            <!-- OOTD 列表 -->
            <div id="section-ootd">
                <div class="flex flex-wrap gap-2 mb-6" id="filterGroup">
                    <div onclick="setFilter('all')" class="tag tag-s selected" data-filter="all"><span class="tag-t">全部</span></div>
                    <div onclick="setFilter('clothes')" class="tag tag-s" data-filter="clothes"><span class="tag-t">服装</span></div>
                    <div onclick="setFilter('mix')" class="tag tag-s" data-filter="mix"><span class="tag-t">服装+配饰</span></div>
                </div>
                <div id="ootdGrid" class="grid grid-cols-2 gap-4"></div>
                <div id="ootdEmpty" class="empty-state hidden">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    <p class="font-bold">暂无单品</p>
                    <p class="text-sm mt-1">点击底部 + 添加你的第一件衣物</p>
                </div>
            </div>

            <!-- 分类浏览 -->
            <div id="section-closet" class="hidden">
                <div id="closetCats" class="space-y-10"></div>
            </div>
        </main>
    </div>

    <!-- 详情页 -->
    <div id="page-detail" class="hidden min-h-screen bg-white">
        <div class="safe-top bg-white sticky top-0 z-50"></div>
        <header class="px-6 flex items-center justify-between h-16 sticky top-[env(safe-area-inset-top)] bg-white z-50">
            <button onclick="goHome()" class="w-10 h-10 flex items-center justify-start">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h2 id="detailTitle" class="text-base font-bold">分类</h2>
            <div class="w-10"></div>
        </header>
        <main class="px-6 pt-4 pb-32">
            <div id="detailGrid" class="grid grid-cols-2 gap-4"></div>
            <div id="detailEmpty" class="empty-state hidden">
                <p>该分类下暂无单品</p>
            </div>
        </main>
    </div>

    <!-- 选择弹窗 -->
    <div id="choiceModal" class="modal" onclick="closeModal('choiceModal')">
        <div class="modal-box !p-6" onclick="event.stopPropagation()">
            <h3 class="text-center text-gray-400 text-xs font-black uppercase tracking-widest mb-6">添加单品</h3>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="openAdd('clothes')" class="bg-gray-100 h-28 rounded-3xl flex flex-col items-center justify-center space-y-2 active:scale-95 transition-transform">
                    <div class="w-12 h-12 bg-black text-white rounded-full flex items-center justify-center text-xl">👔</div>
                    <span class="text-sm font-bold">衣服</span>
                </button>
                <button onclick="openAdd('acc')" class="bg-gray-100 h-28 rounded-3xl flex flex-col items-center justify-center space-y-2 active:scale-95 transition-transform">
                    <div class="w-12 h-12 bg-gray-200 text-black rounded-full flex items-center justify-center text-xl">👜</div>
                    <span class="text-sm font-bold text-gray-600">配饰</span>
                </button>
            </div>
            <button onclick="closeModal('choiceModal')" class="w-full mt-6 py-4 text-gray-400 font-bold">取消</button>
        </div>
    </div>

    <!-- 添加/编辑弹窗 -->
    <div id="addModal" class="modal" onclick="closeModal('addModal')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h3 id="addTitle" class="text-lg font-extrabold">添加单品</h3>
                <button onclick="closeModal('addModal')" class="text-gray-400 font-bold text-sm">关闭</button>
            </div>
            <input type="hidden" id="editId">

            <div class="space-y-5 pb-8">
                <label class="bg-gray-100 rounded-3xl h-44 flex flex-col items-center justify-center cursor-pointer active:bg-gray-200 transition-colors relative overflow-hidden block">
                    <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="previewImg(this)">
                    <div id="uploadBox" class="flex flex-col items-center">
                        <svg class="w-8 h-8 text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        <span class="text-xs font-bold text-gray-400">点击上传照片</span>
                    </div>
                    <img id="previewImg" class="hidden absolute inset-0 w-full h-full object-cover pointer-events-none">
                    <button type="button" id="removeBgBtn" onclick="removeBackground()" class="hidden absolute bottom-3 left-3 right-3 py-2 bg-black/80 text-white text-xs font-bold rounded-xl backdrop-blur-sm">
                        ✨ 移除背景
                    </button>
                    <div id="removeBgLoading" class="hidden absolute inset-0 bg-black/50 flex flex-col items-center justify-center">
                        <div class="text-white text-sm font-bold mb-2">处理中...</div>
                        <button type="button" onclick="cancelRemoveBg()" class="text-white text-xs underline">取消</button>
                    </div>
                </label>

                <div>
                    <label class="text-xs font-black uppercase tracking-widest text-gray-400 block mb-2">分类</label>
                    <select id="itemType" onchange="onTypeChange()" class="w-full rounded-2xl py-4 px-5 text-sm font-bold"></select>
                </div>

                <div id="categoryTagSection" class="hidden">
                    <label class="text-xs font-black uppercase tracking-widest text-gray-400 block mb-2">类型</label>
                    <div class="flex gap-3 mb-3">
                        <button type="button" onclick="setCategoryTag('服装')" id="catTag-clothes" class="cat-tag flex-1 py-4 bg-gray-100 rounded-xl text-sm font-bold text-gray-500">服装</button>
                        <button type="button" onclick="setCategoryTag('服装+配饰')" id="catTag-mix" class="cat-tag flex-1 py-4 bg-gray-100 rounded-xl text-sm font-bold text-gray-500">服装+配饰</button>
                    </div>
                    <input type="hidden" id="categoryTag" value="">
                </div>

                <div id="tagSection">
                    <label class="text-xs font-black uppercase tracking-widest text-gray-400 block mb-2">标签</label>
                    <select id="itemStyle" class="w-full rounded-2xl py-4 px-5 text-sm font-bold mb-3">
                        <option value="">选择风格</option>
                    </select>
                    <select id="itemTemp" class="w-full rounded-2xl py-4 px-5 text-sm font-bold mb-3">
                        <option value="">适穿温度</option>
                    </select>
                    <select id="itemScene" class="w-full rounded-2xl py-4 px-5 text-sm font-bold">
                        <option value="">适用场合</option>
                    </select>
                </div>

                <div id="washSection" class="hidden">
                    <label class="text-xs font-black uppercase tracking-widest text-gray-400 block mb-2">洗涤方式</label>
                    <div class="flex gap-2 mb-3">
                        <button onclick="setWash('机洗')" class="wash-opt flex-1 py-3 bg-gray-100 rounded-xl text-xs font-bold text-gray-500">机洗</button>
                        <button onclick="setWash('手洗')" class="wash-opt flex-1 py-3 bg-gray-100 rounded-xl text-xs font-bold text-gray-500">手洗</button>
                        <button onclick="setWash('干洗')" class="wash-opt flex-1 py-3 bg-gray-100 rounded-xl text-xs font-bold text-gray-500">干洗</button>
                    </div>
                    <textarea id="washNote" placeholder="洗涤注意事项..." class="w-full rounded-2xl py-4 px-5 text-sm font-bold h-20 resize-none"></textarea>
                </div>

                <button onclick="saveItem()" class="w-full bg-black text-white py-4 rounded-2xl font-bold active:scale-95 transition-transform shadow-lg">保存</button>
            </div>
        </div>
    </div>

    <!-- 底部添加按钮 -->
    <div class="fixed bottom-8 left-0 right-0 flex justify-center z-50 pointer-events-none">
        <button onclick="openChoice()" class="w-14 h-14 bg-black text-white rounded-full shadow-2xl flex items-center justify-center pointer-events-auto active:scale-90 transition-transform">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
        </button>
    </div>

    <script>
        // 数据存储
        const DB_KEY = 'closet_data_v1';
        const IMG_KEY = 'closet_imgs_v1';
        let items = [], imgs = {};

        const config = {
            clothes: { types: ['全身','上衣','裤子','裙子','外套','连衣裙','套装'], icon: '👔' },
            acc: { types: ['包包','鞋子','帽子','首饰','眼镜','腰带'], icon: '👜' },
            style: ['休闲','气质','可爱','韩系','复古'],
            temp: ['极热 35℃+','热 28-34℃','舒适 20-27℃','凉 13-19℃','冷 10-12℃'],
            scene: ['通勤','运动','同性好友见面','异性好友见面','出片']
        };

        // 初始化
        function init() {
            loadData();
            fillSelects();
            render();
            setupSW();
        }

        // 数据操作
        function loadData() {
            try {
                items = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
                imgs = JSON.parse(localStorage.getItem(IMG_KEY) || '{}');
            } catch(e) { items = []; imgs = {}; }
        }

        function saveData() {
            localStorage.setItem(DB_KEY, JSON.stringify(items));
            localStorage.setItem(IMG_KEY, JSON.stringify(imgs));
        }

        function exportData() {
            const data = { items, imgs, exportTime: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `closet-backup-${Date.now()}.json`;
            a.click(); URL.revokeObjectURL(url);
        }

        // 页面切换
        function setTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById('section-ootd').classList.toggle('hidden', tab !== 'ootd');
            document.getElementById('section-closet').classList.toggle('hidden', tab !== 'closet');
            if(tab === 'closet') renderCloset();
        }

        function goHome() {
            document.getElementById('page-detail').classList.add('hidden');
            document.getElementById('page-home').classList.remove('hidden');
        }

        function goDetail(title, filterFn) {
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-detail').classList.remove('hidden');
            document.getElementById('detailTitle').textContent = title;
            const filtered = items.filter(filterFn);
            const grid = document.getElementById('detailGrid');
            const empty = document.getElementById('detailEmpty');
            if(filtered.length === 0) { grid.innerHTML = ''; empty.classList.remove('hidden'); }
            else { empty.classList.add('hidden'); grid.innerHTML = filtered.map(i => renderCard(i)).join(''); }
            window.scrollTo(0,0);
        }

        // 渲染
        function render() {
            const filter = document.querySelector('#filterGroup .selected')?.dataset.filter || 'all';
            let filtered = items;
            if (filter === 'clothes') {
                filtered = items.filter(i => i.categoryTag === '服装');
            } else if (filter === 'mix') {
                filtered = items.filter(i => i.categoryTag === '服装+配饰');
            }
            const grid = document.getElementById('ootdGrid');
            const empty = document.getElementById('ootdEmpty');
            if(filtered.length === 0) { grid.innerHTML = ''; empty.classList.remove('hidden'); }
            else { empty.classList.add('hidden'); grid.innerHTML = filtered.map(i => renderCard(i)).join(''); }
        }

        function renderCard(item) {
            const img = imgs[item.id] ? `<img src="${imgs[item.id]}">` :
                `<svg class="w-10 h-10 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>`;
            return `
                <div class="card relative group" onclick="editItem('${item.id}')">
                    ${img}
                    <button onclick="event.stopPropagation();deleteItem('${item.id}')" class="del-btn">×</button>
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/60 to-transparent p-3 pt-8 rounded-b-3xl">
                        <p class="text-white text-xs font-bold truncate">${item.name}</p>
                        <p class="text-white/70 text-[10px]">${item.categoryTag || item.type} · ${item.style || '-'}</p>
                    </div>
                </div>`;
        }

        function renderCloset() {
            const cats = [
                { key: 'type', label: '单品分类', data: [...config.clothes.types, ...config.acc.types] },
                { key: 'style', label: '服装风格', data: config.style },
                { key: 'temp', label: '适穿温度', data: config.temp },
                { key: 'scene', label: '场合', data: config.scene }
            ];
            document.getElementById('closetCats').innerHTML = cats.map(c => `
                <section>
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-xs font-black uppercase tracking-[0.2em] text-gray-400">${c.label}</h3>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        ${c.data.map(v => {
                            const count = items.filter(i => i[c.key] === v).length;
                            return `<div onclick="goDetail('${v}', i=>i.${c.key}==='${v}')" class="tag tag-l ${count===0?'opacity-50':''}"><span class="tag-t">${v}</span><span class="tag-c">${count}件</span></div>`;
                        }).join('')}
                    </div>
                </section>`).join('');
        }

        // 搜索
        function doSearch() {
            const kw = document.getElementById('searchInput').value.trim().toLowerCase();
            document.getElementById('clearBtn').classList.toggle('hidden', !kw);
            if(!kw) { document.getElementById('searchResults').classList.add('hidden'); return; }
            const res = items.filter(i => i.name.toLowerCase().includes(kw) || i.type.includes(kw) || (i.style||'').includes(kw) || (i.scene||'').includes(kw));
            document.getElementById('searchResults').classList.remove('hidden');
            document.getElementById('searchCount').textContent = `${res.length}件`;
            document.getElementById('searchGrid').innerHTML = res.map(i => renderCard(i)).join('');
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearBtn').classList.add('hidden');
            document.getElementById('searchResults').classList.add('hidden');
        }

        // 筛选
        function setFilter(f) {
            document.querySelectorAll('#filterGroup .tag').forEach(t => t.classList.remove('selected'));
            document.querySelector(`[data-filter="${f}"]`).classList.add('selected');
            render();
        }

        // 弹窗
        function openChoice() { document.getElementById('choiceModal').classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        let currentAddMode = '';
        function openAdd(mode) {
            currentAddMode = mode;
            closeModal('choiceModal');
            document.getElementById('addTitle').textContent = '添加单品';
            document.getElementById('editId').value = '';
            document.getElementById('previewImg').classList.add('hidden');
            document.getElementById('uploadBox').classList.remove('hidden');

            const typeSelect = document.getElementById('itemType');
            typeSelect.innerHTML = config[mode].types.map(t => `<option value="${t}">${t}</option>`).join('');
            onTypeChange();
            document.getElementById('addModal').classList.add('show');
        }

        function editItem(id) {
            const item = items.find(i => i.id === id);
            if(!item) return;
            document.getElementById('editId').value = id;
            document.getElementById('addTitle').textContent = '编辑单品';

            currentAddMode = config.clothes.types.includes(item.type) ? 'clothes' : 'acc';
            const typeSelect = document.getElementById('itemType');
            typeSelect.innerHTML = config[currentAddMode].types.map(t => `<option value="${t}" ${t===item.type?'selected':''}>${t}</option>`).join('');

            document.getElementById('itemStyle').value = item.style || '';
            document.getElementById('itemTemp').value = item.temp || '';
            document.getElementById('itemScene').value = item.scene || '';
            document.getElementById('washNote').value = item.wash || '';
            document.getElementById('categoryTag').value = item.categoryTag || '';
            if(item.categoryTag) setCategoryTag(item.categoryTag);

            if(imgs[id]) {
                document.getElementById('previewImg').src = imgs[id];
                document.getElementById('previewImg').classList.remove('hidden');
                document.getElementById('uploadBox').classList.add('hidden');
                document.getElementById('removeBgBtn').classList.add('hidden'); // 编辑时隐藏移除背景按钮
            } else {
                document.getElementById('previewImg').classList.add('hidden');
                document.getElementById('uploadBox').classList.remove('hidden');
            }

            onTypeChange();
            document.getElementById('addModal').classList.add('show');
        }

        // 表单逻辑
        function fillSelects() {
            document.getElementById('itemStyle').innerHTML = '<option value="">选择风格</option>' + config.style.map(s => `<option value="${s}">${s}</option>`).join('');
            document.getElementById('itemTemp').innerHTML = '<option value="">适穿温度</option>' + config.temp.map(t => `<option value="${t}">${t}</option>`).join('');
            document.getElementById('itemScene').innerHTML = '<option value="">适用场合</option>' + config.scene.map(s => `<option value="${s}">${s}</option>`).join('');
        }

        function onTypeChange() {
            const typeValue = document.getElementById('itemType').value;
            const isFullBody = typeValue === '全身';
            const isAccessory = currentAddMode === 'acc';

            // 配饰：只显示上传和分类
            if (isAccessory) {
                document.getElementById('categoryTagSection').classList.add('hidden');
                document.getElementById('tagSection').classList.add('hidden');
                document.getElementById('washSection').classList.add('hidden');
                return;
            }

            // 衣服：显示类型标签选择（服装/服装+配饰）
            document.getElementById('categoryTagSection').classList.remove('hidden');

            // 衣服：选择"全身"时显示标签，其他选项显示洗涤方式
            document.getElementById('tagSection').classList.toggle('hidden', !isFullBody);
            document.getElementById('washSection').classList.toggle('hidden', isFullBody);
            if(!isFullBody) {
                document.getElementById('itemStyle').value = '';
                document.getElementById('itemTemp').value = '';
                document.getElementById('itemScene').value = '';
            }
        }

        function setCategoryTag(tag) {
            document.getElementById('categoryTag').value = tag;
            document.querySelectorAll('.cat-tag').forEach(btn => {
                btn.classList.toggle('bg-black', btn.textContent === tag);
                btn.classList.toggle('text-white', btn.textContent === tag);
                btn.classList.toggle('bg-gray-100', btn.textContent !== tag);
                btn.classList.toggle('text-gray-500', btn.textContent !== tag);
            });
        }

        function setWash(mode) {
            document.getElementById('washNote').value = mode;
            document.querySelectorAll('.wash-opt').forEach(btn => {
                btn.classList.toggle('bg-black', btn.textContent === mode);
                btn.classList.toggle('text-white', btn.textContent === mode);
                btn.classList.toggle('bg-gray-100', btn.textContent !== mode);
            });
        }

        // 取消背景移除
        function cancelRemoveBg() {
            document.getElementById('removeBgLoading').classList.add('hidden');
            document.getElementById('removeBgBtn').classList.remove('hidden');
        }

        // 背景移除功能
        async function removeBackground() {
            const preview = document.getElementById('previewImg');
            const originalData = preview.dataset.original;

            if (!originalData) {
                alert('请先上传图片');
                return;
            }

            // 显示加载状态
            document.getElementById('removeBgLoading').classList.remove('hidden');
            document.getElementById('removeBgBtn').classList.add('hidden');

            try {
                // 将 base64 转换为 blob
                const base64Response = await fetch(originalData);
                const blob = await base64Response.blob();

                // 创建 FormData
                const formData = new FormData();
                formData.append('image_file', blob, 'image.jpg');
                formData.append('size', 'auto');

                console.log('开始调用 remove.bg API...');

                // 添加超时处理
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000); // 15秒超时

                // 使用 CORS 代理 - 如果失败会提示用户
                const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
                const apiUrl = 'https://api.remove.bg/v1.0/removebg';

                let response;
                try {
                    response = await fetch(proxyUrl + apiUrl, {
                        method: 'POST',
                        headers: {
                            'X-Api-Key': 'NQVCNa8mmqJtfjbYyLZQgh3A'
                        },
                        body: formData,
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                } catch (fetchError) {
                    clearTimeout(timeoutId);
                    if (fetchError.name === 'AbortError') {
                        throw new Error('请求超时，请检查网络连接');
                    }
                    // 代理可能不可用，提示用户
                    throw new Error('网络请求失败。请先去 https://cors-anywhere.herokuapp.com/corsdemo 点击"Request temporary access to the demo server"授权后重试');
                }

                console.log('API 响应状态:', response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('API 错误:', errorText);
                    throw new Error('背景移除失败: ' + response.status);
                }

                // 获取处理后的图片
                const resultBlob = await response.blob();
                console.log('获取到结果图片, 大小:', resultBlob.size);
                const resultUrl = URL.createObjectURL(resultBlob);

                // 转换为 base64 并压缩
                const img = new Image();
                img.onload = function() {
                    // 创建临时 canvas 分析人物位置
                    const tempCanvas = document.createElement('canvas');
                    const tempCtx = tempCanvas.getContext('2d');
                    tempCanvas.width = img.width;
                    tempCanvas.height = img.height;
                    tempCtx.drawImage(img, 0, 0);

                    // 获取像素数据
                    const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
                    const data = imageData.data;

                    // 查找人物边界（非透明像素）
                    let minX = tempCanvas.width, minY = tempCanvas.height;
                    let maxX = 0, maxY = 0;
                    let hasContent = false;

                    for (let y = 0; y < tempCanvas.height; y++) {
                        for (let x = 0; x < tempCanvas.width; x++) {
                            const alpha = data[(y * tempCanvas.width + x) * 4 + 3];
                            if (alpha > 10) { // 透明度大于10视为人物
                                hasContent = true;
                                minX = Math.min(minX, x);
                                minY = Math.min(minY, y);
                                maxX = Math.max(maxX, x);
                                maxY = Math.max(maxY, y);
                            }
                        }
                    }

                    // 计算人物中心
                    let centerX, centerY, cropSize;
                    if (hasContent) {
                        centerX = (minX + maxX) / 2;
                        centerY = (minY + maxY) / 2;
                        // 裁剪区域为人物区域的外接正方形
                        const contentWidth = maxX - minX;
                        const contentHeight = maxY - minY;
                        cropSize = Math.max(contentWidth, contentHeight) * 1.2; // 增加20%边距
                        // 确保不超出图片边界
                        cropSize = Math.min(cropSize, Math.min(img.width, img.height));
                    } else {
                        // 如果没有检测到人物，使用图片中心
                        centerX = img.width / 2;
                        centerY = img.height / 2;
                        cropSize = Math.min(img.width, img.height);
                    }

                    // 计算裁剪起点（以人物为中心）
                    let cropX = centerX - cropSize / 2;
                    let cropY = centerY - cropSize / 2;

                    // 边界检查
                    cropX = Math.max(0, Math.min(cropX, img.width - cropSize));
                    cropY = Math.max(0, Math.min(cropY, img.height - cropSize));

                    // 创建最终 canvas
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 800;
                    canvas.height = 800;

                    // 填充白色背景
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // 以人物为中心绘制图片
                    ctx.drawImage(img, cropX, cropY, cropSize, cropSize, 0, 0, 800, 800);

                    const finalData = canvas.toDataURL('image/jpeg', 0.8);
                    preview.src = finalData;
                    preview.dataset.data = finalData;

                    // 隐藏加载状态
                    document.getElementById('removeBgLoading').classList.add('hidden');

                    // 释放临时 URL
                    URL.revokeObjectURL(resultUrl);

                    console.log('背景移除完成，人物已居中');
                };
                img.onerror = function() {
                    throw new Error('图片处理失败');
                };
                img.src = resultUrl;

            } catch (error) {
                console.error('背景移除失败:', error);
                alert('背景移除失败: ' + error.message + '\n\n提示: 由于浏览器安全限制，可能需要使用电脑浏览器或添加 CORS 代理');
                document.getElementById('removeBgLoading').classList.add('hidden');
                document.getElementById('removeBgBtn').classList.remove('hidden');
            }
        }

        // 图片处理
        function previewImg(input) {
            console.log('previewImg called', input.files);
            if(!input.files || !input.files[0]) {
                console.log('no file selected');
                return;
            }
            const file = input.files[0];
            console.log('file selected:', file.name, file.type, file.size);

            if(!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                console.log('FileReader loaded');
                const img = new Image();
                img.onload = function() {
                    console.log('Image loaded, size:', img.width, 'x', img.height);
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxW = 800;
                    const scale = img.width > maxW ? maxW / img.width : 1;
                    canvas.width = Math.floor(img.width * scale);
                    canvas.height = Math.floor(img.height * scale);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const compressed = canvas.toDataURL('image/jpeg', 0.7);
                    const preview = document.getElementById('previewImg');
                    preview.src = compressed;
                    preview.classList.remove('hidden');
                    preview.dataset.data = compressed;
                    preview.dataset.original = e.target.result; // 保存原始图片用于背景移除
                    document.getElementById('uploadBox').classList.add('hidden');
                    document.getElementById('removeBgBtn').classList.remove('hidden');
                    console.log('preview updated');
                };
                img.onerror = function() {
                    alert('图片加载失败，请重试');
                };
                img.src = e.target.result;
            };
            reader.onerror = function() {
                alert('读取文件失败，请重试');
            };
            reader.readAsDataURL(file);
        }

        // 保存
        function saveItem() {
            const id = document.getElementById('editId').value || Date.now().toString();
            const isNew = !document.getElementById('editId').value;
            const typeValue = document.getElementById('itemType').value;

            // 自动生成名称
            const existingCount = items.filter(i => i.type === typeValue).length;
            const name = isNew ? `${typeValue} ${existingCount + 1}` : (items.find(i => i.id === id)?.name || typeValue);

            const item = {
                id,
                name,
                type: typeValue,
                categoryTag: document.getElementById('categoryTag').value,
                style: document.getElementById('itemStyle').value,
                temp: document.getElementById('itemTemp').value,
                scene: document.getElementById('itemScene').value,
                wash: document.getElementById('washNote').value,
                updated: Date.now()
            };

            if(isNew) items.push(item);
            else items = items.map(i => i.id === id ? item : i);

            if(document.getElementById('previewImg').dataset.data) {
                imgs[id] = document.getElementById('previewImg').dataset.data;
            }

            saveData();
            closeModal('addModal');
            render();
        }

        function deleteItem(id) {
            if(!confirm('确定删除这个单品吗？')) return;
            items = items.filter(i => i.id !== id);
            delete imgs[id];
            saveData();
            render();
        }

        // Service Worker
        function setupSW() {
            if('serviceWorker' in navigator) {
                navigator.serviceWorker.register('data:text/javascript,' + encodeURIComponent(`
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                    self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
                `)).catch(() => {});
            }
        }

        window.onload = init;
    </script>
