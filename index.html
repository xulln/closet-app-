<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Closet">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/app-icon-192.png">
    <title>Closet Explore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #fff; color: #1a1a1a; overflow-x: hidden; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .tag { background: #f3f4f6; transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; border: 1px solid transparent; display: flex; align-items: center; justify-content: center; }
        .tag:active { transform: scale(0.96); }
        .tag-s { height: 38px; padding: 0 18px; border-radius: 1rem; white-space: nowrap; }
        .tag-l { min-height: 72px; border-radius: 1.5rem; flex-direction: column; padding: 12px; }
        .tag.selected { background: rgba(229,231,235,0.6); backdrop-filter: blur(12px); transform: scale(1.05); border-color: rgba(0,0,0,0.05); box-shadow: 0 8px 20px -6px rgba(0,0,0,0.08); }
        .tag-t { font-weight: 700; font-size: 12px; color: #6b7280; }
        .tag.selected .tag-t { color: #111827; }
        .tag-c { font-size: 10px; font-weight: 800; margin-top: 4px; color: #9ca3af; }
        .tab { position: relative; padding-bottom: 12px; font-size: 15px; font-weight: 800; transition: all 0.3s; }
        .tab.active { color: #000; } .tab:not(.active) { color: #d1d5db; }
        .tab-dot { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #000; border-radius: 50%; opacity: 0; transition: opacity 0.3s; }
        .tab.active .tab-dot { opacity: 1; }
        .card { background: #f9fafb; border-radius: 2rem; aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; border: 1px solid #f3f4f6; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal.show { opacity: 1; pointer-events: auto; }
        .modal-box { background: #fff; width: 100%; border-radius: 2.5rem 2.5rem 0 0; padding: 2rem; max-height: 92vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal.show .modal-box { transform: translateY(0); }
        input, select, textarea { -webkit-appearance: none; appearance: none; border: none; outline: none; background: #f3f4f6; }
        .hidden { display: none !important; }
        .del-btn { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
        .edit-btn { position: absolute; top: 8px; left: 8px; width: 28px; height: 28px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #9ca3af; }
        .empty-state svg { width: 64px; height: 64px; margin: 0 auto 16px; opacity: 0.3; }
    </style>
</head>
<body class="bg-white min-h-screen">
    <!-- 首页 -->
    <div id="page-home">
        <div class="safe-top bg-white sticky top-0 z-50"></div>
        <header class="px-6 bg-white sticky top-[env(safe-area-inset-top)] z-50">
            <div class="flex items-center justify-between h-16">
                <h1 class="text-2xl font-extrabold tracking-tighter">Closet</h1>
                <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center" onclick="exportData()">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                </div>
            </div>
            <div class="relative mb-6">
                <input type="text" id="searchInput" placeholder="搜索关键词、风格、场合..." oninput="doSearch()" class="w-full bg-gray-100 rounded-2xl py-3.5 px-12 text-sm font-semibold">
                <svg class="absolute left-4 top-4 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <button onclick="clearSearch()" id="clearBtn" class="hidden absolute right-4 top-3.5 w-6 h-6 bg-gray-300 rounded-full text-white text-xs">×</button>
            </div>
            <div class="flex space-x-8 mb-2">
                <button onclick="setTab('ootd')" id="tab-ootd" class="tab active">全身穿搭<div class="tab-dot"></div></button>
                <button onclick="setTab('closet')" id="tab-closet" class="tab">分类浏览<div class="tab-dot"></div></button>
            </div>
        </header>

        <main class="px-6 pt-4 pb-32">
            <!-- 搜索结果 -->
            <div id="searchResults" class="hidden">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-xs font-black uppercase tracking-widest text-gray-400">搜索结果</h3>
                    <span id="searchCount" class="text-xs text-gray-400"></span>
                </div>
                <div id="searchGrid" class="grid grid-cols-2 gap-4"></div>
            </div>

            <!-- OOTD 列表 -->
            <div id="section-ootd">
                <div class="flex flex-wrap gap-2 mb-6" id="filterGroup">
                    <div onclick="setFilter('all')" class="tag tag-s selected" data-filter="all"><span class="tag-t">全部</span></div>
                    <div onclick="setFilter('clothes')" class="tag tag-s" data-filter="clothes"><span class="tag-t">服装</span></div>
                    <div onclick="setFilter('mix')" class="tag tag-s" data-filter="mix"><span class="tag-t">服装+配饰</span></div>
                </div>
                <div id="ootdGrid" class="grid grid-cols-2 gap-4"></div>
                <div id="ootdEmpty" class="empty-state hidden">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    <p class="font-bold">暂无单品</p>
                    <p class="text-sm mt-1">点击底部 + 添加你的第一件衣物</p>
                </div>
            </div>

            <!-- 分类浏览 -->
            <div id="section-closet" class="hidden">
                <!-- 顶部标签切换 -->
                <div class="flex bg-gray-100 rounded-2xl p-1 mb-6">
                    <button id="closetTabClothes" onclick="setClosetTab('clothes')" class="flex-1 py-3 text-sm font-bold rounded-xl bg-white shadow-sm transition-all">服装单品</button>
                    <button id="closetTabAcc" onclick="setClosetTab('acc')" class="flex-1 py-3 text-sm font-bold rounded-xl text-gray-500 transition-all">配饰单品</button>
                </div>

                <!-- 分类网格 -->
                <div id="closetGrid" class="grid grid-cols-4 gap-2 mb-8">
                    <!-- 动态生成分类卡片 -->
                </div>

                <!-- 选中分类的物品列表 -->
                <div id="closetItems" class="bg-gray-50 rounded-2xl p-4">
                    <div class="flex items-center justify-between mb-4 px-2">
                        <h3 id="closetItemsTitle" class="text-base font-bold">分类名称</h3>
                    </div>
                    <div id="closetItemsGrid" class="grid grid-cols-2 gap-3">
                        <!-- 动态生成物品卡片 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 详情页 -->
    <div id="page-detail" class="hidden min-h-screen bg-white">
        <div class="safe-top bg-white sticky top-0 z-50"></div>
        <header class="px-6 flex items-center justify-between h-16 sticky top-[env(safe-area-inset-top)] bg-white z-50">
            <button onclick="goHome()" class="w-10 h-10 flex items-center justify-start">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h2 id="detailTitle" class="text-base font-bold">分类</h2>
            <div class="w-10"></div>
        </header>
        <main class="px-6 pt-4 pb-32">
            <div id="detailGrid" class="grid grid-cols-2 gap-4"></div>
            <div id="detailEmpty" class="empty-state hidden">
                <p>该分类下暂无单品</p>
            </div>
        </main>
    </div>

    <!-- 选择弹窗 -->
    <div id="choiceModal" class="modal" onclick="closeModal('choiceModal')">
        <div class="modal-box !p-6" onclick="event.stopPropagation()">
            <h3 class="text-center text-gray-400 text-xs font-black uppercase tracking-widest mb-6">添加单品</h3>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="openAdd('clothes')" class="bg-gray-100 h-28 rounded-3xl flex flex-col items-center justify-center space-y-2 active:scale-95 transition-transform">
                    <div class="w-12 h-12 bg-black text-white rounded-full flex items-center justify-center text-xl">👔</div>
                    <span class="text-sm font-bold">衣服</span>
                </button>
                <button onclick="openAdd('acc')" class="bg-gray-100 h-28 rounded-3xl flex flex-col items-center justify-center space-y-2 active:scale-95 transition-transform">
                    <div class="w-12 h-12 bg-gray-200 text-black rounded-full flex items-center justify-center text-xl">👜</div>
                    <span class="text-sm font-bold text-gray-600">配饰</span>
                </button>
            </div>
            <button onclick="closeModal('choiceModal')" class="w-full mt-6 py-4 text-gray-400 font-bold">取消</button>
        </div>
    </div>

    <!-- 添加/编辑弹窗 -->
    <div id="addModal" class="modal" onclick="closeModal('addModal')">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h3 id="addTitle" class="text-lg font-extrabold">添加单品</h3>
                <button onclick="closeModal('addModal')" class="text-gray-400 font-bold text-sm">关闭</button>
            </div>
            <input type="hidden" id="editId">

            <div class="space-y-5 pb-8">
                <div class="bg-gray-100 rounded-3xl relative overflow-hidden" style="aspect-ratio: 3/4;">
                    <label class="absolute inset-0 flex flex-col items-center justify-center cursor-pointer active:bg-gray-200 transition-colors" id="uploadLabel">
                        <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="previewImg(this)">
                        <div id="uploadBox" class="flex flex-col items-center">
                            <svg class="w-8 h-8 text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                            <span class="text-xs font-bold text-gray-400">点击上传照片</span>
                        </div>
                    </label>
                    <div id="previewWrapper" class="hidden absolute inset-0 bg-gray-100">
                        <img id="previewImg" class="w-full h-full" style="object-fit: cover;">
                        <button type="button" onclick="clearImage()" class="absolute top-2 right-2 w-8 h-8 bg-black/60 text-white rounded-full flex items-center justify-center text-lg font-bold z-10">×</button>
                    </div>
                </div>

                <!-- 编辑图片按钮 -->
                <button type="button" id="editImageBtn" onclick="enableImageEdit()" class="w-full py-3 bg-gray-100 rounded-2xl text-sm font-bold text-gray-600 active:scale-95 transition-transform">
                    ✏️ 编辑图片
                </button>

                <div>
                    <label class="text-xs font-black uppercase tracking-widest text-gray-400 block mb-2">分类</label>
                    <select id="itemType" onchange="onTypeChange()" class="w-full rounded-2xl py-4 px-5 text-sm font-bold"></select>
                </div>

                <div id="categoryTagSection" class="hidden">
                    <label class="text-xs font-black uppercase tracking-widest text-gray-400 block mb-2">类型</label>
                    <div class="flex gap-3 mb-3">
                        <button type="button" onclick="setCategoryTag('服装')" id="catTag-clothes" class="cat-tag flex-1 py-4 bg-gray-100 rounded-xl text-sm font-bold text-gray-500">服装</button>
                        <button type="button" onclick="setCategoryTag('服装+配饰')" id="catTag-mix" class="cat-tag flex-1 py-4 bg-gray-100 rounded-xl text-sm font-bold text-gray-500">服装+配饰</button>
                    </div>
                    <input type="hidden" id="categoryTag" value="">
                </div>

                <div id="tagSection">
                    <label class="text-xs font-black uppercase tracking-widest text-gray-400 block mb-2">标签</label>
                    <select id="itemStyle" class="w-full rounded-2xl py-4 px-5 text-sm font-bold mb-3">
                        <option value="">选择风格</option>
                    </select>
                    <select id="itemTemp" class="w-full rounded-2xl py-4 px-5 text-sm font-bold mb-3">
                        <option value="">适穿温度</option>
                    </select>
                    <select id="itemScene" class="w-full rounded-2xl py-4 px-5 text-sm font-bold">
                        <option value="">适用场合</option>
                    </select>
                </div>

                <div id="washSection" class="hidden">
                    <label class="text-xs font-black uppercase tracking-widest text-gray-400 block mb-2">洗涤方式</label>
                    <div class="flex gap-2 mb-3">
                        <button onclick="setWash('机洗')" class="wash-opt flex-1 py-3 bg-gray-100 rounded-xl text-xs font-bold text-gray-500">机洗</button>
                        <button onclick="setWash('手洗')" class="wash-opt flex-1 py-3 bg-gray-100 rounded-xl text-xs font-bold text-gray-500">手洗</button>
                        <button onclick="setWash('干洗')" class="wash-opt flex-1 py-3 bg-gray-100 rounded-xl text-xs font-bold text-gray-500">干洗</button>
                    </div>
                    <textarea id="washNote" placeholder="洗涤注意事项..." class="w-full rounded-2xl py-4 px-5 text-sm font-bold h-20 resize-none"></textarea>
                </div>

                <button onclick="saveItem()" class="w-full bg-black text-white py-4 rounded-2xl font-bold active:scale-95 transition-transform shadow-lg">保存</button>
            </div>
        </div>
    </div>

    <!-- 底部添加按钮 -->
    <div id="addBtnContainer" class="fixed bottom-8 left-0 right-0 flex justify-center z-50 pointer-events-none transition-opacity duration-300">
        <button onclick="openChoice()" class="w-14 h-14 bg-black text-white rounded-full shadow-2xl flex items-center justify-center pointer-events-auto active:scale-90 transition-transform">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
        </button>
    </div>

    <script>
        // 数据存储
        const DB_KEY = 'closet_data_v1';
        const IMG_KEY = 'closet_imgs_v1';
        const ORIGINAL_IMG_KEY = 'closet_original_imgs_v1';  // 存储原始图片
        const IMG_TRANSFORM_KEY = 'closet_img_transforms_v1'; // 存储裁剪参数
        let items = [], imgs = {}, originalImgs = {}, imgTransforms = {};

        const config = {
            clothes: { types: ['全身','上衣','裤子','裙子','外套','连衣裙','套装'], icon: '👔' },
            acc: { types: ['包包','鞋子','帽子','首饰','眼镜','腰带'], icon: '👜' },
            style: ['休闲','气质','可爱','韩系','复古'],
            temp: ['极热 35℃+','热 28-34℃','舒适 20-27℃','凉 13-19℃','冷 10-12℃'],
            scene: ['通勤','运动','同性好友见面','异性好友见面','出片']
        };

        // 初始化
        // 滚动时隐藏+按钮，停止时显示
        let scrollTimer;
        window.addEventListener('scroll', () => {
            const addBtn = document.getElementById('addBtnContainer');
            if (addBtn) {
                addBtn.style.opacity = '0';
                addBtn.style.pointerEvents = 'none';
            }
            clearTimeout(scrollTimer);
            scrollTimer = setTimeout(() => {
                if (addBtn) {
                    addBtn.style.opacity = '1';
                    addBtn.style.pointerEvents = 'auto';
                }
            }, 150);
        }, { passive: true });

        function init() {
            loadData();
            fillSelects();
            render();
            setupSW();
        }

        // 数据操作
        function loadData() {
            try {
                items = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
                imgs = JSON.parse(localStorage.getItem(IMG_KEY) || '{}');
                originalImgs = JSON.parse(localStorage.getItem(ORIGINAL_IMG_KEY) || '{}');
                imgTransforms = JSON.parse(localStorage.getItem(IMG_TRANSFORM_KEY) || '{}');
            } catch(e) { items = []; imgs = {}; originalImgs = {}; imgTransforms = {}; }
        }

        function saveData() {
            localStorage.setItem(DB_KEY, JSON.stringify(items));
            localStorage.setItem(IMG_KEY, JSON.stringify(imgs));
            localStorage.setItem(ORIGINAL_IMG_KEY, JSON.stringify(originalImgs));
            localStorage.setItem(IMG_TRANSFORM_KEY, JSON.stringify(imgTransforms));
        }

        function exportData() {
            const data = { items, imgs, exportTime: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `closet-backup-${Date.now()}.json`;
            a.click(); URL.revokeObjectURL(url);
        }

        // 页面切换
        function setTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById('section-ootd').classList.toggle('hidden', tab !== 'ootd');
            document.getElementById('section-closet').classList.toggle('hidden', tab !== 'closet');
            if(tab === 'closet') renderCloset();
        }

        function goHome() {
            document.getElementById('page-detail').classList.add('hidden');
            document.getElementById('page-home').classList.remove('hidden');
        }

        function goDetail(title, filterFn) {
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-detail').classList.remove('hidden');
            document.getElementById('detailTitle').textContent = title;
            const filtered = items.filter(filterFn);
            const grid = document.getElementById('detailGrid');
            const empty = document.getElementById('detailEmpty');
            if(filtered.length === 0) { grid.innerHTML = ''; empty.classList.remove('hidden'); }
            else { empty.classList.add('hidden'); grid.innerHTML = filtered.map(i => renderCard(i)).join(''); }
            window.scrollTo(0,0);
        }

        // 渲染
        function render() {
            // 首页只显示 type === '全身' 的衣服，并根据 categoryTag 筛选
            const filter = document.querySelector('#filterGroup .selected')?.dataset.filter || 'all';
            let filtered = items.filter(i => i.type === '全身');

            if (filter === 'clothes') {
                filtered = filtered.filter(i => i.categoryTag === '服装');
            } else if (filter === 'mix') {
                filtered = filtered.filter(i => i.categoryTag === '服装+配饰');
            }

            const grid = document.getElementById('ootdGrid');
            const empty = document.getElementById('ootdEmpty');
            if(filtered.length === 0) { grid.innerHTML = ''; empty.classList.remove('hidden'); }
            else { empty.classList.add('hidden'); grid.innerHTML = filtered.map(i => renderCard(i)).join(''); }
        }

        function renderCard(item) {
            const img = imgs[item.id] ? `<img src="${imgs[item.id]}">` :
                `<svg class="w-10 h-10 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>`;
            return `
                <div class="card relative group" onclick="editItem('${item.id}')">
                    ${img}
                    <button onclick="event.stopPropagation();deleteItem('${item.id}')" class="del-btn">×</button>
                    <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/60 to-transparent p-3 pt-8 rounded-b-3xl">
                        <p class="text-white text-[10px] leading-relaxed">${item.style || '无风格'}</p>
                        <p class="text-white/80 text-[10px] leading-relaxed">${item.temp || '无温度'}</p>
                        <p class="text-white/60 text-[10px] leading-relaxed">${item.scene || '无场合'}</p>
                    </div>
                </div>`;
        }

        // 分类浏览页面状态
        let currentClosetTab = 'clothes';
        let currentSelectedCategory = null;

        // 切换服装/配饰标签
        function setClosetTab(tab) {
            currentClosetTab = tab;
            // 更新按钮样式
            document.getElementById('closetTabClothes').classList.toggle('bg-white', tab === 'clothes');
            document.getElementById('closetTabClothes').classList.toggle('shadow-sm', tab === 'clothes');
            document.getElementById('closetTabClothes').classList.toggle('text-gray-500', tab !== 'clothes');
            document.getElementById('closetTabAcc').classList.toggle('bg-white', tab === 'acc');
            document.getElementById('closetTabAcc').classList.toggle('shadow-sm', tab === 'acc');
            document.getElementById('closetTabAcc').classList.toggle('text-gray-500', tab !== 'acc');

            // 重新渲染分类网格
            renderClosetCategories();

            // 默认选中第一个分类（过滤掉"全身"）
            let types = tab === 'clothes' ? config.clothes.types : config.acc.types;
            types = types.filter(type => type !== '全身');
            if (types.length > 0) {
                selectCategory(types[0]);
            }
        }

        // 获取分类图标（SVG 线稿风格）
        function getCategoryIcon(type) {
            const icons = {

        // 图片预览手势缩放功能
        let imgTransform = {
            scale: 1,
            x: 0,
            y: 0,
            isDragging: false,

            startY: 0,
            enabled: false  // 默认禁用编辑，需要点击编辑按钮后才启用

        function setupImageGestures() {
            const container = document.getElementById('previewWrapper');
            const img = document.getElementById('previewImg');

            if (!container || !img) return;

            // 双指缩放
            let initialScale = 1;
            let initialDistance = 0;

            container.ontouchstart = function(e) {
                // 未启用编辑时，不处理手势
                if (!imgTransform.enabled) return;

                if (e.touches.length === 2) {
                    // 双指缩放开始
                    initialDistance = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    initialScale = imgTransform.scale;
                } else if (e.touches.length === 1) {
                    // 单指拖拽开始
                    imgTransform.isDragging = true;
                    imgTransform.startX = e.touches[0].clientX - imgTransform.x;
                    imgTransform.startY = e.touches[0].clientY - imgTransform.y;
                    img.style.cursor = 'grabbing';
                }
            };

            container.ontouchmove = function(e) {
                e.preventDefault();

                if (e.touches.length === 2) {
                    // 双指缩放
                    const distance = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    imgTransform.scale = Math.max(0.5, Math.min(3, initialScale * (distance / initialDistance)));
                    applyImageTransform();
                } else if (e.touches.length === 1 && imgTransform.isDragging) {
                    // 单指拖拽
                    imgTransform.x = e.touches[0].clientX - imgTransform.startX;
                    imgTransform.y = e.touches[0].clientY - imgTransform.startY;
                    applyImageTransform();
                }
            };

            container.ontouchend = function() {
                imgTransform.isDragging = false;
                img.style.cursor = 'grab';
            };

            // 鼠标支持
            img.onmousedown = function(e) {
                // 未启用编辑时，不处理鼠标拖拽
                if (!imgTransform.enabled) return;
                imgTransform.isDragging = true;
                imgTransform.startX = e.clientX - imgTransform.x;
                imgTransform.startY = e.clientY - imgTransform.y;
                img.style.cursor = 'grabbing';
            };

            document.onmousemove = function(e) {
                if (!imgTransform.isDragging || !imgTransform.enabled) return;
                e.preventDefault();
                imgTransform.x = e.clientX - imgTransform.startX;
                imgTransform.y = e.clientY - imgTransform.startY;
                applyImageTransform();
            };

            document.onmouseup = function() {
                imgTransform.isDragging = false;
                img.style.cursor = 'grab';
            };

            // 滚轮缩放
            container.onwheel = function(e) {
                // 未启用编辑时，不处理滚轮
                if (!imgTransform.enabled) return;
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                imgTransform.scale = Math.max(0.5, Math.min(3, imgTransform.scale * delta));
                applyImageTransform();
            };
        }

        function applyImageTransform() {
            const img = document.getElementById('previewImg');
            img.style.transform = `translate(${imgTransform.x}px, ${imgTransform.y}px) scale(${imgTransform.scale})`;
        }

        function resetImageTransform() {
            imgTransform.scale = 1;
            imgTransform.x = 0;
            imgTransform.y = 0;
            imgTransform.isDragging = false;
            imgTransform.enabled = false;  // 重置时禁用编辑
            // 显示编辑按钮
            const editBtn = document.getElementById('editImageBtn');
            if (editBtn) editBtn.classList.remove('hidden');
            applyImageTransform();
        }

        function getTransformedImageData() {
            const img = document.getElementById('previewImg');
            const container = document.getElementById('previewWrapper');

            if (!img.naturalWidth) return null;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // 输出固定 600x800 (3:4 比例)
            canvas.width = 600;
            canvas.height = 800;

            const containerRect = container.getBoundingClientRect();
            const scale = imgTransform.scale;

            // 计算 object-fit: cover 下的图片显示尺寸（与浏览器渲染一致）
            const imgRatio = img.naturalWidth / img.naturalHeight;
            const containerRatio = containerRect.width / containerRect.height;

            let displayWidth, displayHeight, initialX, initialY;
            if (imgRatio > containerRatio) {
                // 图片更宽，按高度填充，左右被裁剪
                displayHeight = containerRect.height;
                displayWidth = displayHeight * imgRatio;
                initialX = (containerRect.width - displayWidth) / 2;
                initialY = 0;
            } else {
                // 图片更高或等比例，按宽度填充，上下被裁剪
                displayWidth = containerRect.width;
                displayHeight = displayWidth / imgRatio;
                initialX = 0;
                initialY = (containerRect.height - displayHeight) / 2;
            }

            // 计算相对于原始图片的缩放比例
            const sourceScale = img.naturalWidth / displayWidth;

            // 计算可见区域的裁剪（考虑手势变换和 object-fit: cover 的初始偏移）
            // 实际显示的图片位置 = 初始偏移 + 手势位移
            const displayedX = initialX + imgTransform.x;
            const displayedY = initialY + imgTransform.y;

            // 计算从原始图片的哪个位置开始裁剪
            const sourceX = -displayedX * sourceScale / scale;
            const sourceY = -displayedY * sourceScale / scale;
            const sourceWidth = containerRect.width * sourceScale / scale;
            const sourceHeight = containerRect.height * sourceScale / scale;

            // 绘制裁剪后的图片到 canvas
            ctx.drawImage(
                img,
                Math.max(0, sourceX), Math.max(0, sourceY),
                Math.min(img.naturalWidth, sourceWidth), Math.min(img.naturalHeight, sourceHeight),
                0, 0, 600, 800
            );

            return canvas.toDataURL('image/jpeg', 0.85);
        }

        // 图片处理
        function previewImg(input) {
            console.log('previewImg called', input.files);
            if(!input.files || !input.files[0]) {
                console.log('no file selected');
                return;
            }
            const file = input.files[0];
            console.log('file selected:', file.name, file.type, file.size);

            if(!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                console.log('FileReader loaded');
                const img = new Image();
                img.onload = function() {
                    console.log('Image loaded, size:', img.width, 'x', img.height);
                    const previewWrapper = document.getElementById('previewWrapper');
                    const preview = document.getElementById('previewImg');
                    const uploadLabel = document.getElementById('uploadLabel');

                    // 显示预览，隐藏上传按钮
                    preview.src = e.target.result;
                    preview.dataset.original = e.target.result;
                    preview.classList.remove('hidden');
                    previewWrapper.classList.remove('hidden');
                    uploadLabel.classList.add('hidden');

                    // 重置并启用手势缩放
                    resetImageTransform();
                    setupImageGestures();

                    console.log('preview updated');
                };
                img.onerror = function() {
                    alert('图片加载失败，请重试');
                };
                img.src = e.target.result;
            };
            reader.onerror = function() {
                alert('读取文件失败，请重试');
            };
            reader.readAsDataURL(file);
        }

        // 保存
        function saveItem() {
            const id = document.getElementById('editId').value || Date.now().toString();
            const isNew = !document.getElementById('editId').value;
            const typeValue = document.getElementById('itemType').value;

            // 自动生成名称
            const existingCount = items.filter(i => i.type === typeValue).length;
            const name = isNew ? `${typeValue} ${existingCount + 1}` : (items.find(i => i.id === id)?.name || typeValue);

            const item = {
                id,
                name,
                type: typeValue,
                categoryTag: document.getElementById('categoryTag').value,
                style: document.getElementById('itemStyle').value,
                temp: document.getElementById('itemTemp').value,
                scene: document.getElementById('itemScene').value,
                wash: document.getElementById('washNote').value,
                updated: Date.now()
            };

            if(isNew) items.push(item);
            else items = items.map(i => i.id === id ? item : i);

            // 保存图片（应用手势变换）
            const previewImg = document.getElementById('previewImg');
            const transformedData = getTransformedImageData();
            if(transformedData) {
                imgs[id] = transformedData;
                // 同时保存原始图片用于重新编辑
                if(previewImg.dataset.original) {
                    originalImgs[id] = previewImg.dataset.original;
                }
                // 保存裁剪参数，用于编辑时恢复状态
                imgTransforms[id] = {
                    scale: imgTransform.scale,
                    x: imgTransform.x,
                    y: imgTransform.y
                };
            } else if(previewImg.dataset.data) {
                imgs[id] = previewImg.dataset.data;
            }

            saveData();
            closeModal('addModal');
            render();
        }

        function deleteItem(id) {
            if(!confirm('确定删除这个单品吗？')) return;
            items = items.filter(i => i.id !== id);
            delete imgs[id];
            delete originalImgs[id];  // 同时删除原始图片
            delete imgTransforms[id]; // 同时删除裁剪参数
            saveData();
            render();
        }

        // Service Worker
        function setupSW() {
            if('serviceWorker' in navigator) {
                navigator.serviceWorker.register('data:text/javascript,' + encodeURIComponent(`
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                    self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
                `)).catch(() => {});
            }
        }

        window.onload = init;
    </script>
